name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile \
            log-replay.py \
            claude-log2model.py \
            codex-log2model.py \
            gemini-log2model.py \
            aider-log2model.py \
            cursor-log2model.py \
            log-model-renderer.py \
            log-replay-mp4.py \
            log-replay-pdf.py \
            log-replay-gif.py \
            log-replay-stream.py \
            log_replay_tui.py \
            search_utils.py \
            session-shipper.py \
            session-stats.py \
            web_ui.py

      - name: Run pytest (if available)
        run: |
          if pip show pytest > /dev/null 2>&1 || pip install pytest; then
            pytest --tb=short || true
          fi
